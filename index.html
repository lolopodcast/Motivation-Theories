m1_nav:"1. SDT 自我決定理論",m1_title:"SDT 自我決定理論",
m1_overview:"Self-Determination Theory（Deci & Ryan, 1985, 2000）回答的核心問題是：學生為什麼想學？SDT 提出三大基本心理需求——自主性、歸屬感、勝任感——作為內在動機的基礎，並透過動機內化連續體解釋外在動機如何逐步內化。",
m1_highlights:["Autonomy 自主性","Relatedness 歸屬感","Competence 勝任感","OIT 動機內化連續體","內在 vs. 外在動機"],
m1_p1:"Autonomy（自主性）指學生感受到自己有選擇權，而非被迫執行。當學生能選擇題目、呈現方式、難度層級時，更可能挑到自己有機會成功的任務，內化「我做到了」的感受。在飛輪模型中，Autonomy 是 Mastery Experience 的上游前因——有選擇權才能累積有含金量的成功經驗。",
m1_p2:"Relatedness（歸屬感）指學生感受到與老師、同儕之間的連結與信任。歸屬感強的課堂，學生才會認同彼此，「別人的成功」才能變成「跟我類似的人的成功」。Relatedness 同時是 Vicarious Experience 和 Verbal Persuasion 的上游——沒有歸屬感，替代經驗和言語說服都無法生效。",
m1_p3:"Competence（勝任感）指學生感受到自己有能力應對挑戰。此構念與 Self-Efficacy 高度重疊，為維持架構的精簡原則，在飛輪模型中已由 SE 的四大來源完全吸收。",
m1_p4:"SDT 的子理論 OIT（Organismic Integration Theory）提出動機內化連續體：外在調節→內攝調節→認同調節→整合調節→內在動機。教學設計的目標不只是激發內在動機，更包括幫助學生將外在要求逐步內化（Ryan & Deci, 2000）。",
m1_p5:"SDT 在飛輪中扮演「土壤」角色——Autonomy 和 Relatedness 是 SE 四個來源得以發生的前提條件。沒有自主性，成功經驗的含金量低；沒有歸屬感，替代經驗和言語說服都無法生效（Niemiec & Ryan, 2009）。",
m1_alert:"SDT 是飛輪的第一推——教師在此層面的課堂設計啟動整個循環。",
m1_wrapup:"SDT 提供了飛輪的土壤層。自主性讓學生有選擇權，為成功經驗創造條件；歸屬感讓學生認同彼此，為替代經驗和言語說服打開通道。勝任感與 SE 高度重疊，在精簡架構中由 SE 的四大來源替代。動機內化連續體則提醒我們，教學設計不只追求內在動機，更要引導外在動機逐步內化。",
m1_terms:[
{front:"Autonomy\n自主性",back:"學生感受到自己有選擇權，而非被迫執行。是 Mastery Experience 的上游前因。"},
{front:"Relatedness\n歸屬感",back:"學生感受到與老師、同儕之間的連結與信任。是 Vicarious Exp. 和 Verbal Persuasion 的上游。"},
{front:"Competence\n勝任感",back:"學生感受到自己有能力應對挑戰。與 SE 高度重疊，在飛輪中由 SE 吸收。"},
{front:"OIT\n有機體整合理論",back:"SDT 子理論，提出動機內化連續體：外在調節→內攝→認同→整合→內在動機。"},
{front:"Intrinsic Motivation\n內在動機",back:"因活動本身的滿足感而投入，非外在獎懲驅動。SDT 的核心目標。"},
{front:"External Regulation\n外在調節",back:"完全由外部獎懲驅動的動機，如修課只為學分。內化程度最低。"}
],
m1_q:[
{q:"SDT 提出的三大基本心理需求不包含下列何者？",opts:["自主性 Autonomy","歸屬感 Relatedness","勝任感 Competence","成就感 Achievement"],ans:_A3,exp:"SDT 三大需求為 Autonomy、Relatedness、Competence。Achievement 不在其中。"},
{q:"在飛輪模型中，Autonomy 是哪個 SE 來源的上游前因？",opts:["Mastery Experience","Vicarious Experience","Verbal Persuasion","Emotional States"],ans:_A0,exp:"有選擇權→挑到能成功的任務→累積成功經驗，Autonomy 是 Mastery Experience 的上游。"},
{q:"Relatedness 同時是哪兩個 SE 來源的上游？",opts:["Mastery + Vicarious","Vicarious + Verbal","Verbal + Emotional","Mastery + Emotional"],ans:_A1,exp:"歸屬感讓替代經驗和言語說服生效：認同彼此→別人的成功跟我有關；有信任→說服才有效。"},
{q:"OIT 動機內化連續體的最低階段是？",opts:["內在動機","認同調節","內攝調節","外在調節"],ans:_A3,exp:"外在調節是內化程度最低的階段，完全由外部獎懲驅動。"},
{q:"SDT 在飛輪中扮演什麼角色？",opts:["行動決策","傳動機制","土壤（前提條件）","結果回饋"],ans:_A2,exp:"SDT 提供土壤——Autonomy 和 Relatedness 是 SE 四個來源得以發生的前提條件。"},
{q:"下列何者最能描述 Competence 在本架構中的處理方式？",opts:["作為獨立的第四理論","由 VIE 理論吸收","由 SE 四大來源吸收替代","從架構中完全移除"],ans:_A2,exp:"Competence 與 SE 高度重疊，為維持精簡原則，由 SE 的四大來源（特別是 Mastery Experience）完全吸收。"}
],

m2_nav:"2. SE 自我效能理論",m2_title:"SE 自我效能理論",
m2_overview:"Self-Efficacy（Bandura, 1977, 1997）回答的核心問題是：我做得到嗎？Bandura 提出四大效能感來源，依影響力排序為 Mastery Experience > Vicarious Experience > Verbal Persuasion > Emotional States。本模組探討每個來源的上游前因。",
m2_highlights:["Mastery Experience","Vicarious Experience","Verbal Persuasion","Emotional States","任務特定性","影響力層級"],
m2_p1:"Mastery Experience（成功經驗）是最強的效能感來源——親身做到過，大腦就記住了「我可以」。在飛輪中，它的上游前因是 Autonomy：有選擇權才能挑到能成功的任務，累積有意義的成功經驗。被指派不感興趣的題目，就算做完了，成功經驗的含金量也很低。",
m2_p2:"Vicarious Experience（替代經驗）是看到跟自己類似的人做到了。關鍵前提是「那個人跟我像」——如果班上沒有歸屬感，同學報告得再好，學生心裡想的是「那是他，跟我無關」。Relatedness 讓「別人的成功」變成「跟我類似的人的成功」。",
m2_p3:"Verbal Persuasion（言語說服）是老師或同儕說「你可以的」。但這句話要有效，前提是說的人跟我有信任關係——陌生人說「你可以的」是噪音，信任的老師說的才會進去。Relatedness 是 Verbal Persuasion 的前提。",
m2_p4:"Emotional States（情緒生理狀態）在 EMI 課程特別關鍵。學生站起來用英文報告，心跳加速、手心出汗——這個生理反應本身就在告訴大腦「我不行」。它的上游前因是 Mindset：Growth Mindset 的學生把心跳解讀為「我在興奮」，Fixed Mindset 解讀為「我在害怕」。",
m2_p5:"SE 的特性是任務特定的：一個學生可能對數學有高 SE 但對英文口語有低 SE。在 EMI 情境中，學生同時面對語言障礙和專業內容，雙重挑戰讓 SE 特別容易崩塌（Bandura, 1997）。",
m2_wrapup:"SE 四大來源各有其上游前因：Autonomy→Mastery、Relatedness→Vicarious+Verbal、Mindset→Emotional。影響力依序為 Mastery 最強、Emotional 最弱，但在 EMI 情境中 Emotional States 的角色不可忽視。SE 是任務特定的，教師需要針對具體任務設計階梯式成功經驗。",
m2_terms:[
{front:"Mastery Experience\n成功經驗",back:"親身做到過，是最強的效能感來源。上游前因：Autonomy（有選擇權→能成功的任務）。"},
{front:"Vicarious Experience\n替代經驗",back:"看到跟自己類似的人做到了。前提：Relatedness（歸屬感→認同彼此）。"},
{front:"Verbal Persuasion\n言語說服",back:"被信任的人說「你可以的」。前提：Relatedness（有信任關係→說服才有效）。"},
{front:"Emotional States\n情緒生理狀態",back:"焦慮壓低效能感，正向情緒提升。上游：Mindset（Growth→興奮；Fixed→害怕）。"},
{front:"Task-Specificity\n任務特定性",back:"SE 是針對特定任務的信心判斷，不是泛化的自信。同一人對不同任務可有不同 SE。"},
{front:"影響力層級",back:"Bandura (1997): Mastery > Vicarious > Verbal > Emotional。設計教學應優先確保成功經驗。"}
],

{q:"在飛輪模型中，Vicarious Experience 的上游前因是？",opts:["Autonomy","Competence","Relatedness","Mindset"],ans:_A2,exp:"Relatedness→認同彼此→「他的成功跟我有關」，歸屬感是替代經驗的前提。"},

{q:"Verbal Persuasion 要有效，最關鍵的前提條件是？",opts:["說的人很有權威","說的人跟我有信任關係","說的內容很具體","說的次數要夠多"],ans:_A1,exp:"陌生人說「你可以的」是噪音——信任關係（Relatedness）是 Verbal Persuasion 的前提。"},
{q:"在 EMI 課程中，SE 特別容易崩塌的原因是？",opts:["課程太簡單","學生同時面對語言障礙和專業內容的雙重挑戰","教師不夠權威","考試太少"],ans:_A1,exp:"EMI 學生同時面對語言障礙和專業內容，雙重挑戰讓任務特定的 SE 特別容易崩塌。"}
],

m3_nav:"3. VIE 期望理論",m3_title:"VIE 期望理論",
m3_overview:"Expectancy Theory（Vroom, 1964）回答的核心問題是：值得努力嗎？VIE 將動機拆解為三個乘法因子——Expectancy（期望）、Instrumentality（工具性）、Valence（效價）——任一為零，動機就為零。",
m3_highlights:["Expectancy 期望","Instrumentality 工具性","Valence 效價","乘法關係","E 與 SE 的區別","Valence 負值"],
m3_p1:"Expectancy（期望）問的是：我努力會有成果嗎？這是「努力→表現」的因果判斷。與 SE 高度相關但不相同：SE 問「我做不做得到」（能力判斷），E 問「努力會不會有成果」（因果判斷）。Mindset 同時影響兩者——Fixed Mindset 讓 E 系統性偏低，因為不相信「努力→能力提升」這條路徑存在。",
m3_p2:"Instrumentality（工具性）問的是：成果能換到我要的東西嗎？即「表現→獎勵」的連結。大學實務中常見的斷裂包括：分組報告的搭便車現象（我表現好但搭便車的人也拿同樣分數）、評分標準不透明（不知道努力如何轉化為成績）。教師需要建立清楚的表現→獎勵連結。",
m3_p3:"Valence（效價）問的是：那個東西我真的在乎嗎？Vroom (1964) 指出取值範圍為 -1 到 +1：正值代表趨近動機，零代表無感，負值代表主動想避開的結果。負值在 EMI 課程尤其重要——Fixed Mindset 的學生可能因害怕暴露英文能力不足（負 Valence）而逃避發言。",
m3_p4:"三者是乘法關係：Motivation = E × I × V。任一為零，動機就為零。這解釋了「我知道該讀書但就是不想動」——可能是 E 低（覺得努力沒用）、V 低（不在乎結果）、或 I 斷裂（覺得努力做好也不會得到公平肯定）。",
m3_p5:"VIE 在飛輪中的角色是將經驗轉化為行動決策。SE 提供信心，VIE 將信心轉化為「我要去做」的行動。SE+Mindset 強化 E，配合 I 和 V 驅動學習行動。行動的結果又回饋為新的成敗經驗，飛輪再轉一圈。",
m3_wrapup:"VIE 將動機拆解為三個可操作的因子。E 受 SE 和 Mindset 影響，I 需要教師建立透明的評量機制，V 則提醒我們連結課程內容與學生真正在乎的目標。三者是乘法——任一斷裂都會讓整個動機歸零。在飛輪中，VIE 是將累積的經驗和信心轉化為具體行動的最後一哩路。",
m3_terms:[
{front:"Expectancy (E)\n期望",back:"我努力會有成果嗎？努力→表現的因果判斷。與 SE 相關但不同：SE 是能力判斷，E 是因果判斷。"},
{front:"Instrumentality (I)\n工具性",back:"成果能換到我要的東西嗎？表現→獎勵的連結。搭便車和不透明評分會斷裂 I。"},
{front:"Valence (V)\n效價",back:"那個東西我真的在乎嗎？獎勵的主觀價值。取值 -1 到 +1，負值代表想避開的結果。"},
{front:"Motivation = E×I×V\n乘法結構",back:"三因子相乘，任一為零動機就為零。解釋了「知道該做但不想動」的現象。"},
{front:"Free-rider Problem\n搭便車問題",back:"分組報告中不付出努力卻獲得同等獎勵，斷裂了 Instrumentality 的連結。"},
{front:"Negative Valence\n負效價",back:"學生主動想避開的結果（如公開丟臉）。Fixed Mindset 學生因害怕暴露不足而逃避。"}
],
m3_q:[
{q:"VIE 理論中，Instrumentality 指的是？",opts:["努力→表現的信心","表現→獎勵的連結","獎勵的主觀價值","能力是否可改變"],ans:_A1,exp:"Instrumentality 是「表現→獎勵」的連結——成果能換到我要的東西嗎？"},
{q:"Motivation = E×I×V 中，若 V = 0 代表？",opts:["學生非常在乎結果","學生對結果完全無感","學生害怕結果","學生能力不足"],ans:_A1,exp:"V=0 代表學生對獎勵完全無感，不在乎結果，動機歸零。"},
{q:"Expectancy (E) 與 Self-Efficacy (SE) 的主要區別是？",opts:["E 是能力判斷，SE 是因果判斷","E 是因果判斷，SE 是能力判斷","兩者完全相同","E 只影響 Valence"],ans:_A1,exp:"SE 問「我做不做得到」（能力判斷），E 問「努力會不會有成果」（因果判斷）。"},
{q:"Valence 的取值範圍為？",opts:["0 到 1","0 到 100","-1 到 +1","-10 到 +10"],ans:_A2,exp:"Vroom (1964) 指出 Valence 取值 -1 到 +1，負值代表想避開的結果。"},
{q:"搭便車問題主要斷裂的是 VIE 中的哪個因子？",opts:["Expectancy","Instrumentality","Valence","以上皆非"],ans:_A1,exp:"搭便車讓表現好的人覺得「做好也不會得到公平肯定」，斷裂了 I。"},
{q:"VIE 在飛輪中的角色是？",opts:["提供土壤","累積經驗","傳動機制","將經驗和信心轉化為行動決策"],ans:_A3,exp:"VIE 是飛輪的行動階段——SE 提供信心，VIE 將信心轉化為具體行動。"}
],

m4_nav:"4. 傳動機制",m4_title:"傳動機制：Attribution 與 Mindset",
m4_overview:"Attribution（歸因）和 Mindset（心態）不是獨立的第四、第五個理論，而是三大理論之間的傳動機制。Attribution 是 SE→Mindset 的轉接器，Mindset 是同時壓在 SE 和 E 底下的基岩。",
m4_highlights:["Attribution 歸因","三歸因維度","Locus / Stability / Controllability","Growth vs. Fixed Mindset","Mindset→SE","Mindset→E","Mindset→Emotional"],
m4_p1:"Attribution（歸因理論，Weiner 1985）的定位是 SE 和 Mindset 之間的轉接器。經驗本身不會自動改變信念，是「對經驗的解釋」在改變信念。Weiner 將成敗原因分為三個維度：Locus（內外歸因）、Stability（穩定性）、Controllability（可控性）。",
m4_p2:"關鍵洞見：當學生將失敗歸因於內部、不穩定、可控的因素（如「我這次沒準備好」），會維持動機繼續嘗試；若歸因於內部、穩定、不可控的因素（如「我就是不行」），則會放棄並損害自我效能。這就是 Attribution 的傳動功能——它決定了成敗經驗往哪個方向轉化。",
m4_p3:"因果鏈：Mastery + Vicarious Experience → Attribution → Mindset。學生親身成功過、也看到類似的人成功過（SE 來源），這些經驗逼他重新解釋「為什麼會成功」（Attribution），如果歸因到努力和策略（可控因素），Mindset 往 Growth 方向鬆動。",
m4_p4:"Mindset（心態，Dweck 2006）的定位是同時壓在 SE 和 Expectancy 底下的基岩。它有三條影響路徑：Mindset→SE（效能感的彈性）、Mindset→E（努力是否能提升能力的信念）、Mindset→Emotional States（生理激發的正負向編碼）。",
m4_p5:"Mindset 與 Valence 的區分：Valence 問「結果有多重要」（主觀評價），Mindset 問「能力是否可改變」（底層信念）。高 V + Growth → 積極投入；高 V + Fixed → 逃避挑戰。同樣的高 Valence 配上不同 Mindset 會導致完全相反的行為。",
m4_wrapup:"Attribution 和 Mindset 是三大理論之間的傳動齒輪。Attribution 把成敗經驗轉化為信念改變，Mindset 作為基岩同時影響 SE 的彈性、E 的因果判斷、和情緒的正負編碼。教師不需要直接介入這兩個層面——透過操作 SE 的四個來源和正確的歸因引導，傳動機制會自行運轉。",
m4_terms:[
{front:"Attribution\n歸因",back:"對成敗原因的解釋。Weiner (1985) 分為三維度：Locus、Stability、Controllability。"},
{front:"Locus of Causality\n因果歸屬",back:"原因在內部（能力、努力）或外部（運氣、任務難度）。"},
{front:"Stability\n穩定性",back:"原因是持久不變的（能力）或可變的（努力）。影響對未來成功的預期。"},
{front:"Controllability\n可控性",back:"原因是個人可控的（努力）或不可控的（天賦）。影響情緒和動機維持。"},
{front:"Growth Mindset\n成長型心態",back:"相信能力可透過努力發展。效能感有彈性、E 偏高、心跳=興奮。"},
{front:"Fixed Mindset\n定型化心態",back:"相信能力是天生固定的。效能感脆弱、E 偏低、心跳=害怕。"}
],
m4_q:[
{q:"Weiner 歸因理論的三個維度不包含？",opts:["Locus","Stability","Controllability","Valence"],ans:_A3,exp:"Weiner 三維度為 Locus、Stability、Controllability。Valence 屬於 VIE 理論。"},
{q:"學生說「我就是不行」，這種歸因屬於？",opts:["內部、不穩定、可控","外部、穩定、不可控","內部、穩定、不可控","外部、不穩定、可控"],ans:_A2,exp:"「我就是不行」歸因於能力——內部（自己）、穩定（不會變）、不可控（天生的）。"},
{q:"Attribution 在飛輪中的定位是？",opts:["獨立的第四個理論","SE 的四大來源之一","SE→Mindset 的傳動轉接器","VIE 的子因子"],ans:_A2,exp:"Attribution 是傳動機制——把成敗經驗的解釋轉化為 Mindset 的改變。"},
{q:"Growth Mindset 的學生面對心跳加速，最可能的解讀是？",opts:["我在害怕","我能力不足","我在興奮","我應該放棄"],ans:_A2,exp:"Growth Mindset 把生理激發編碼為正向——心跳加速=我在興奮。"},
{q:"「高 Valence + Fixed Mindset」最可能導致什麼行為？",opts:["積極投入","逃避挑戰","無動於衷","尋求幫助"],ans:_A1,exp:"很在乎結果但相信能力固定→害怕失敗會證明自己不行→逃避挑戰。"},
{q:"教師要鬆動學生的 Fixed Mindset，最有效的策略是？",opts:["直接告訴學生要有 Growth Mindset","透過操作 SE 四來源間接鬆動","降低課程難度","增加考試次數"],ans:_A1,exp:"教師不需直接介入 Mindset——透過操作 SE 的四個來源，Mindset 會被順便鬆動。"}
],

m5_nav:"5. 自我增強飛輪",m5_title:"自我增強飛輪模型",
m5_overview:"三大理論之間不只是「互補」，而是有因果串接——SDT 提供土壤，SE 在土壤上長出經驗，VIE 把經驗轉化為行動決策。行動結果又回饋到新一輪經驗，形成六階段的自我增強飛輪。",
m5_highlights:["六階段因果鏈","① 土壤 SDT","② 經驗 SE","③ 解讀 Attribution","④ 基岩 Mindset","⑤ 行動 VIE","⑥ 回饋循環","第一推"],
m5_p1:"階段①土壤（SDT）：Autonomy 讓學生有選擇權，Relatedness 建立信任與認同。這是一切的起點，沒有土壤就長不出有含金量的經驗。",
m5_p2:"階段②經驗（SE）：Autonomy→Mastery Experience，Relatedness→Vicarious Experience + Verbal Persuasion。土壤上長出具體的成功經驗和替代學習。",
m5_p3:"階段③解讀（Attribution）：學生對成敗經驗歸因——努力（內部、可控）vs. 能力（內部、不可控）。歸因方向決定了經驗往 Growth 還是 Fixed 轉化。階段④基岩（Mindset）：歸因塑造心態。Growth 強化 SE+E，Fixed 削弱 SE+E。Mindset 同時影響 Emotional States 的正負編碼。",
m5_p4:"階段⑤行動（VIE）：SE + Mindset 強化 E，配合 I（透明評量）和 V（真實連結），驅動學習行動。階段⑥回饋（循環）：行動結果→新的成敗經驗→回到②，飛輪再轉一圈。",
m5_p5:"飛輪的第一推來自教師在 SDT 層面的課堂設計：(1) 提供自主性——讓學生選題目、選呈現方式、選難度層級；(2) 建立歸屬感——讓學生認同彼此、建立信任關係；(3) 有意識地引導歸因方向——在回饋時強調努力和策略，而非天賦。往上做 SDT 的課堂設計，往下滲透到 Mindset 的鬆動。",
m5_wrapup:"飛輪模型整合了三大理論和兩個傳動機制為一條完整的因果鏈。教師的操作槓桿集中在 SDT 層面——提供自主性和歸屬感、引導正確歸因——飛輪就會自行轉動。每一圈的結果回饋都在強化下一圈，形成正向循環。核心心法：往上做，往下滲透。",
m5_terms:[
{front:"飛輪模型\nFlywheel Model",back:"SDT→SE→Attribution→Mindset→VIE→行動→回饋的六階段自我增強循環。"},
{front:"第一推\nFirst Push",back:"教師在 SDT 層面的課堂設計：提供自主性、建立歸屬感、引導歸因方向。"},
{front:"因果串接\nCausal Chain",back:"三大理論不只互補，而是有上下游因果關係——SDT 是 SE 的前因，SE 是 VIE 的前因。"},
{front:"往上做，往下滲透",back:"在 SDT 層面（最上游）設計課堂，效果會自動滲透到 Mindset（最深層）。"},
{front:"正向循環\nVirtuous Cycle",back:"飛輪每轉一圈，成功經驗和 Growth Mindset 都在強化，下一圈更容易轉動。"},
{front:"負向循環\nVicious Cycle",back:"失敗→Fixed 歸因→Mindset 固化→SE 和 E 下降→更不敢行動→更多失敗。"}
],
m5_q:[
{q:"飛輪模型的第一階段（土壤）對應的理論是？",opts:["SE","VIE","SDT","Attribution"],ans:_A2,exp:"SDT 提供土壤——Autonomy 和 Relatedness 是一切的起點。"},
{q:"飛輪的「第一推」來自？",opts:["學生的內在動機","教師在 SDT 層面的課堂設計","外部獎勵制度","同儕競爭"],ans:_A1,exp:"第一推是教師在 SDT 層面的設計——提供自主性、建立歸屬感、引導歸因。"},
{q:"飛輪六階段的正確順序是？",opts:["SDT→VIE→SE→Attribution→Mindset→回饋","SDT→SE→Attribution→Mindset→VIE→回饋","VIE→SE→SDT→Mindset→Attribution→回饋","SE→SDT→VIE→Attribution→Mindset→回饋"],ans:_A1,exp:"土壤(SDT)→經驗(SE)→解讀(Attribution)→基岩(Mindset)→行動(VIE)→回饋。"},
{q:"「往上做，往下滲透」中的「上」指的是？",opts:["最深層的 Mindset","最上游的 SDT","最終的行動 VIE","中間的 Attribution"],ans:_A1,exp:"SDT 是最上游——在此層面設計課堂，效果自動往下滲透到 Mindset。"},
{q:"飛輪的回饋階段（⑥）如何銜接到下一圈？",opts:["行動結果產生新的成敗經驗，回到②經驗階段","直接回到①土壤重新設計","跳過所有中間步驟直接影響 VIE","只影響 Mindset 不影響其他"],ans:_A0,exp:"行動結果→新的成敗經驗→回到②（SE 來源），飛輪再轉一圈。"},
{q:"負向循環的起點通常是？",opts:["成功經驗太多","失敗後歸因到穩定不可控因素","教師給予太多自主性","Valence 太高"],ans:_A1,exp:"失敗→歸因到能力（穩定不可控）→Fixed Mindset 固化→SE 和 E 下降→更多失敗。"}
],

m6_nav:"6. 教學設計啟示",m6_title:"教學設計啟示",
m6_overview:"基於三大理論互補架構和飛輪模型，教師可操作的槓桿集中在六個層面：Autonomy（自主性）、Relatedness（歸屬感）、階梯任務、歸因引導、透明評量、真實連結。每個層面都對應到飛輪的特定環節。",
m6_highlights:["Autonomy 自主性","Relatedness 歸屬感","階梯任務","歸因引導","透明評量","真實連結"],
m6_p1:"Autonomy（自主性）：讓學生選題目、選呈現方式、選難度層級。對應飛輪路徑：SDT→Mastery Experience。有選擇權的學生更可能挑到自己有機會成功的任務，累積有含金量的成功經驗。",
m6_p2:"Relatedness（歸屬感）：小組合作、同儕回饋、建立安全的課堂氛圍。對應飛輪路徑：SDT→Vicarious Experience + Verbal Persuasion。歸屬感讓同儕的成功和鼓勵成為有效的效能感來源。",
m6_p3:"階梯任務：由易到難的任務序列，確保早期成功經驗。對應 SE: Mastery Experience（Bandura, 1997）。設計的關鍵是讓學生在第一個任務就能成功，建立「我做得到」的初始信心。",
m6_p4:"歸因引導：回饋時強調「你的策略很好」而非「你很聰明」。對應飛輪路徑：Attribution→Growth Mindset（Dweck, 2006）。讚美努力和策略（可控因素），引導學生建立 Growth Mindset。",
m6_p5:"透明評量：讓學生清楚知道努力如何轉化為成績，並建立防範搭便車機制（如同儕互評）。對應 VIE: Expectancy + Instrumentality。真實連結：讓學生看到課程內容與未來目標的關聯。對應 VIE: Valence——把「這門課很重要」變成學生自己的判斷。",
m6_wrapup:"六大操作槓桿不是獨立運作的——它們對應飛輪的不同環節，彼此串接。Autonomy 和 Relatedness 啟動飛輪，階梯任務累積經驗，歸因引導塑造心態，透明評量和真實連結驅動行動。教師只需在 SDT 層面做好設計，配合正確的歸因引導和透明的評量機制，飛輪就會自行轉動。",
m6_terms:[
{front:"歸因引導\nAttribution Guidance",back:"回饋時強調努力和策略（可控因素），引導學生將成功歸因於自己的投入。"},
{front:"階梯任務\nScaffolded Tasks",back:"由易到難的任務序列，確保早期成功經驗。關鍵：第一個任務就要能成功。"},
{front:"透明評量\nTransparent Assessment",back:"讓學生清楚知道努力如何轉化為成績。包含防範搭便車的機制。"},
{front:"真實連結\nReal-world Connection",back:"讓學生看到課程內容與未來目標的關聯，提升 Valence。"},
{front:"同儕互評\nPeer Evaluation",back:"防範搭便車的機制之一，強化 Instrumentality 的公平性。"},
{front:"讚美策略而非天賦",back:"「你的方法很好」而非「你很聰明」。前者引導 Growth Mindset，後者強化 Fixed Mindset。"}
],
m6_q:[
{q:"「讓學生選題目、選呈現方式」對應飛輪的哪個路徑？",opts:["VIE→行動","SDT (Autonomy)→Mastery Experience","Attribution→Mindset","Mindset→Emotional"],ans:_A1,exp:"Autonomy→有選擇權→挑到能成功的任務→Mastery Experience。"},
{q:"教師回饋「你很聰明」最可能強化學生的？",opts:["Growth Mindset","Fixed Mindset","Instrumentality","Relatedness"],ans:_A1,exp:"讚美天賦暗示能力是天生的，強化 Fixed Mindset。應讚美策略和努力。"},
{q:"同儕互評機制主要強化 VIE 中的哪個因子？",opts:["Expectancy","Instrumentality","Valence","以上皆非"],ans:_A1,exp:"同儕互評讓表現與獎勵的連結更公平，強化 Instrumentality。"},
{q:"階梯任務的設計關鍵是？",opts:["第一個任務要最難","所有任務難度一樣","第一個任務就要讓學生能成功","只要最後一個任務成功即可"],ans:_A2,exp:"關鍵是讓學生在第一個任務就能成功，建立「我做得到」的初始 SE。"},
{q:"「讓學生看到課程內容與未來目標的關聯」提升的是？",opts:["Expectancy","Instrumentality","Valence","Autonomy"],ans:_A2,exp:"讓課程與學生的未來目標產生關聯，提升他們對結果的主觀價值（Valence）。"},
{q:"六大操作槓桿中，啟動飛輪的前兩個是？",opts:["透明評量 + 真實連結","階梯任務 + 歸因引導","Autonomy + Relatedness","Valence + Instrumentality"],ans:_A2,exp:"Autonomy 和 Relatedness 是 SDT 層面的設計，啟動飛輪的第一推。"}
],

m0_nav:"0. Executive Summary",m0_title:"Student Learning Motivation: Three-Theory Flywheel",
m0_intro:"Learning motivation is the core challenge of instructional design. This interactive module integrates three motivation theories — SDT (Self-Determination Theory), SE (Self-Efficacy), and VIE (Expectancy Theory) — into a low-redundancy, high-complementarity framework. Attribution and Mindset serve as transmission mechanisms, forming a self-reinforcing flywheel model. The first push comes from the instructor's SDT-level classroom design: providing autonomy, building relatedness, and guiding correct attribution. Once spinning, the flywheel cycles through experience accumulation → attribution interpretation → mindset shift → action decision → outcome feedback, each revolution strengthening the next. This module covers six learning units and four interactive labs. The core principle: design at the top, permeate to the bottom.",
m0_img_alt:"Self-Reinforcing Flywheel Model Diagram",
m0_img_caption:"Diagram: Complementary Framework of Three Motivation Theories & Self-Reinforcing Flywheel Model",
m0_why:"Why do motivation theories matter for instructional design?",m0_why_desc:"In EMI courses, students face both language barriers and professional content simultaneously, making confidence particularly fragile. No single theory fully explains motivation — only a complementary framework can provide systematic instructional design guidance.",

m1_nav:"1. SDT",m1_title:"SDT: Self-Determination Theory",
m1_overview:"Self-Determination Theory (Deci & Ryan, 1985, 2000) addresses the core question: Why do students want to learn? SDT proposes three basic psychological needs — autonomy, relatedness, and competence — as foundations of intrinsic motivation, and explains how extrinsic motivation can be progressively internalized through the OIT continuum.",
m1_highlights:["Autonomy","Relatedness","Competence","OIT Internalization Continuum","Intrinsic vs. Extrinsic Motivation"],
m1_p1:"Autonomy means students feel they have genuine choices rather than being forced to comply. When students can choose topics, presentation formats, and difficulty levels, they're more likely to select tasks where they can succeed, internalizing the feeling of 'I did it.' In the flywheel, Autonomy is the upstream antecedent of Mastery Experience — choice enables meaningful success.",
m1_p2:"Relatedness means students feel connected to and trusted by their teachers and peers. In a classroom with strong relatedness, students identify with each other, transforming 'someone else's success' into 'the success of someone like me.' Relatedness is simultaneously the upstream of both Vicarious Experience and Verbal Persuasion — without it, neither can take effect.",
m1_p3:"Competence means students feel capable of meeting challenges. This construct overlaps highly with Self-Efficacy. To maintain the framework's parsimony, Competence is fully absorbed and replaced by SE's four sources (especially Mastery Experience) in our flywheel model.",
m1_p4:"SDT's sub-theory OIT (Organismic Integration Theory) proposes an internalization continuum: external regulation → introjection → identification → integration → intrinsic motivation. The instructional design goal isn't just sparking intrinsic motivation — it also includes helping students progressively internalize external requirements (Ryan & Deci, 2000).",
m1_p5:"SDT plays the role of 'soil' in the flywheel — Autonomy and Relatedness are prerequisites for SE's four sources to operate. Without autonomy, success experiences lack authenticity; without relatedness, vicarious experience and verbal persuasion cannot take effect (Niemiec & Ryan, 2009).",
m1_alert:"SDT is the flywheel's first push — the instructor's classroom design at this level initiates the entire cycle.",
m1_wrapup:"SDT provides the soil layer for the flywheel. Autonomy creates conditions for meaningful success experiences; relatedness opens channels for vicarious learning and verbal persuasion. Competence overlaps with SE and is absorbed by SE's four sources in our parsimonious framework. The OIT internalization continuum reminds us that instructional design should guide progressive internalization of extrinsic motivation, not just chase intrinsic motivation.",
m1_terms:[
{front:"Autonomy",back:"Students feel they have genuine choices. Upstream antecedent of Mastery Experience in the flywheel."},
{front:"Relatedness",back:"Students feel connected to teachers and peers. Upstream of Vicarious Exp. and Verbal Persuasion."},
{front:"Competence",back:"Students feel capable of meeting challenges. Overlaps with SE; absorbed by SE's four sources in this framework."},
{front:"OIT\nOrganismic Integration Theory",back:"SDT sub-theory proposing an internalization continuum: external regulation → introjection → identification → integration → intrinsic motivation."},
{front:"Intrinsic Motivation",back:"Engaging in activity for its inherent satisfaction, not driven by external rewards. SDT's core goal."},
{front:"External Regulation",back:"Motivation driven entirely by external rewards/punishments (e.g., taking a course just for credits). Lowest internalization."}
],
m1_q:[
{q:"Which is NOT one of SDT's three basic psychological needs?",opts:["Autonomy","Relatedness","Competence","Achievement"],ans:_A3,exp:"SDT's three needs are Autonomy, Relatedness, and Competence. Achievement is not among them."},
{q:"In the flywheel, Autonomy is the upstream antecedent of which SE source?",opts:["Mastery Experience","Vicarious Experience","Verbal Persuasion","Emotional States"],ans:_A0,exp:"Choice → tasks with success potential → accumulated success experiences. Autonomy feeds Mastery Experience."},
{q:"Relatedness is simultaneously the upstream of which two SE sources?",opts:["Mastery + Vicarious","Vicarious + Verbal","Verbal + Emotional","Mastery + Emotional"],ans:_A1,exp:"Relatedness enables both vicarious experience (identifying with peers) and verbal persuasion (trust makes encouragement effective)."},
{q:"What is the lowest stage of OIT's internalization continuum?",opts:["Intrinsic motivation","Identification","Introjection","External regulation"],ans:_A3,exp:"External regulation is the lowest internalization stage — entirely driven by external rewards/punishments."},
{q:"What role does SDT play in the flywheel?",opts:["Action decision","Transmission mechanism","Soil (prerequisite conditions)","Outcome feedback"],ans:_A2,exp:"SDT provides the soil — Autonomy and Relatedness are prerequisites for SE's four sources to operate."},
{q:"How is Competence handled in this framework?",opts:["As an independent fourth theory","Absorbed by VIE theory","Absorbed and replaced by SE's four sources","Completely removed from the framework"],ans:_A2,exp:"Competence overlaps with SE; to maintain parsimony, it's absorbed by SE's four sources (especially Mastery Experience)."}
],

m2_nav:"2. Self-Efficacy",m2_title:"SE: Self-Efficacy Theory",
m2_overview:"Self-Efficacy (Bandura, 1977, 1997) addresses the core question: Can I do this? Bandura proposes four efficacy sources ranked by influence: Mastery Experience > Vicarious Experience > Verbal Persuasion > Emotional States. This module explores each source's upstream antecedent.",
m2_highlights:["Mastery Experience","Vicarious Experience","Verbal Persuasion","Emotional States","Task-Specificity","Influence Hierarchy"],
m2_p1:"Mastery Experience is the most powerful efficacy source — having personally succeeded, the brain encodes 'I can do this.' In the flywheel, its upstream antecedent is Autonomy: choice enables students to select tasks where success is possible, building meaningful success experiences. Assigned tasks that students find irrelevant produce low-value success experiences.",
m2_p2:"Vicarious Experience means seeing someone similar to yourself succeed. The critical prerequisite is 'that person is like me' — without classroom relatedness, a peer's excellent presentation triggers 'that's them, not me.' Relatedness transforms 'someone else's success' into 'the success of someone like me,' activating vicarious learning.",
m2_p3:"Verbal Persuasion means a teacher or peer saying 'you can do it.' For this to work, the speaker must have a trust relationship with the student — a stranger's encouragement is noise, but a trusted teacher's words land. Relatedness is the prerequisite for Verbal Persuasion to be effective.",
m2_p4:"Emotional States are especially critical in EMI courses. When a student stands up to present in English, their heart rate increases and palms sweat — this physiological response itself tells the brain 'I can't do this.' The upstream antecedent is Mindset: Growth Mindset students interpret increased heart rate as 'I'm excited,' while Fixed Mindset students interpret it as 'I'm scared.'",
m2_p5:"SE is task-specific: a student may have high SE for mathematics but low SE for English oral presentation. In EMI contexts, students face both language barriers and professional content simultaneously — this dual challenge makes task-specific SE particularly fragile (Bandura, 1997).",
m2_wrapup:"SE's four sources each have upstream antecedents: Autonomy→Mastery, Relatedness→Vicarious+Verbal, Mindset→Emotional. Influence ranks Mastery highest and Emotional lowest, but in EMI contexts Emotional States play an outsized role. SE is task-specific — instructors need to design scaffolded success experiences for specific tasks.",
m2_terms:[
{front:"Mastery Experience",back:"Having personally succeeded. The strongest efficacy source. Upstream: Autonomy (choice → achievable tasks)."},
{front:"Vicarious Experience",back:"Seeing someone similar succeed. Prerequisite: Relatedness (belonging → peer identification)."},
{front:"Verbal Persuasion",back:"Being told 'you can do it' by a trusted person. Prerequisite: Relatedness (trust → effective encouragement)."},
{front:"Emotional States",back:"Anxiety lowers efficacy; positive emotions raise it. Upstream: Mindset (Growth→excited; Fixed→scared)."},
{front:"Task-Specificity",back:"SE is a confidence judgment about a specific task, not generalized self-confidence. Same person, different SE for different tasks."},
{front:"Influence Hierarchy",back:"Bandura (1997): Mastery > Vicarious > Verbal > Emotional. Design teaching to prioritize success experiences."}
],
m2_q:[
{q:"According to Bandura, which source has the strongest influence on SE?",opts:["Verbal Persuasion","Vicarious Experience","Mastery Experience","Emotional States"],ans:_A2,exp:"Mastery Experience is the strongest — having personally succeeded encodes 'I can do this' in the brain."},
{q:"In the flywheel, what is the upstream antecedent of Vicarious Experience?",opts:["Autonomy","Competence","Relatedness","Mindset"],ans:_A2,exp:"Relatedness → peer identification → 'their success is relevant to me.' Belonging enables vicarious learning."},
{q:"A Fixed Mindset student's heart races before a presentation. Their most likely interpretation?",opts:["I'm excited","I'm ready","I'm scared","I'm eager"],ans:_A2,exp:"Fixed Mindset encodes physiological arousal as threat — racing heart = I'm scared = I can't do this."},
{q:"Which best illustrates SE's task-specificity?",opts:["A person's SE is identical across all tasks","SE and SDT's Competence are exactly the same","The same student may have high math SE but low English oral SE","SE is only influenced by Mastery Experience"],ans:_A2,exp:"SE is task-specific — the same student can have different SE levels for different tasks."},
{q:"The most critical prerequisite for Verbal Persuasion to be effective is?",opts:["The speaker has authority","The speaker has a trust relationship with the student","The content is very specific","The frequency is sufficient"],ans:_A1,exp:"A stranger's 'you can do it' is noise — a trust relationship (Relatedness) is the prerequisite for Verbal Persuasion."},
{q:"Why is SE particularly fragile in EMI courses?",opts:["Courses are too easy","Students face dual challenges of language barriers and professional content","Teachers lack authority","There are too few exams"],ans:_A1,exp:"EMI students face language barriers AND professional content simultaneously — this dual challenge makes task-specific SE especially fragile."}
],

m3_nav:"3. VIE Theory",m3_title:"VIE: Expectancy Theory",
m3_overview:"Expectancy Theory (Vroom, 1964) addresses the core question: Is it worth the effort? VIE decomposes motivation into three multiplicative factors — Expectancy, Instrumentality, and Valence — any one being zero means zero motivation.",
m3_highlights:["Expectancy","Instrumentality","Valence","Multiplicative Relationship","E vs. SE Distinction","Negative Valence"],
m3_p1:"Expectancy asks: Will my effort lead to results? This is the effort→performance causal judgment. Highly related to SE but distinct: SE asks 'can I do this' (capability judgment), while E asks 'will effort lead to results' (causal judgment). Mindset affects both — Fixed Mindset systematically lowers E because it denies the effort→capability improvement pathway.",
m3_p2:"Instrumentality asks: Will results lead to what I want? This is the performance→reward link. Common breaks in university settings include: free-rider problems in group projects (I perform well but free-riders get the same grade) and opaque grading criteria (unclear how effort translates to grades). Instructors need clear performance→reward connections.",
m3_p3:"Valence asks: Do I actually care about the reward? Vroom (1964) specifies a range of -1 to +1: positive values represent approach motivation, zero means indifference, negative values represent outcomes students actively want to avoid. Negative valence is particularly important in EMI — Fixed Mindset students may avoid speaking due to fear of exposing language inadequacy (negative Valence).",
m3_p4:"The three factors are multiplicative: Motivation = E × I × V. Any factor being zero means zero motivation. This explains 'I know I should study but just can't start' — possibly low E (effort feels futile), low V (don't care about results), or broken I (good performance won't be fairly recognized).",
m3_p5:"VIE's role in the flywheel is converting experience into action decisions. SE provides confidence; VIE converts confidence into 'I will act.' SE+Mindset strengthen E, combined with I (transparent assessment) and V (real-world connections), driving learning action. Action outcomes feed back as new success/failure experiences — the flywheel turns again.",
m3_wrapup:"VIE decomposes motivation into three actionable factors. E is influenced by SE and Mindset, I requires transparent assessment mechanisms, and V reminds us to connect course content with students' genuine goals. The multiplicative relationship means any broken link zeroes out motivation. In the flywheel, VIE is the last mile — converting accumulated experience and confidence into concrete action.",
m3_terms:[
{front:"Expectancy (E)",back:"Will my effort lead to results? Effort→performance causal judgment. Related to but distinct from SE (capability vs. causality)."},
{front:"Instrumentality (I)",back:"Will results lead to what I want? Performance→reward link. Free-riders and opaque grading break I."},
{front:"Valence (V)",back:"Do I actually care? Subjective value of rewards. Range: -1 to +1. Negative = outcomes to avoid."},
{front:"Motivation = E×I×V",back:"Multiplicative structure — any factor at zero means zero motivation. Explains 'know I should but won't.'"},
{front:"Free-rider Problem",back:"In group projects, non-contributors receive equal rewards, breaking the performance→reward (Instrumentality) link."},
{front:"Negative Valence",back:"Outcomes students actively want to avoid (e.g., public embarrassment). Fixed Mindset students may avoid challenges due to negative V."}
],
m3_q:[
{q:"In VIE theory, Instrumentality refers to?",opts:["Confidence that effort leads to performance","The performance→reward connection","Subjective value of rewards","Whether ability can change"],ans:_A1,exp:"Instrumentality is the performance→reward link — will results lead to what I want?"},
{q:"In Motivation = E×I×V, if V = 0, it means?",opts:["Student cares greatly about results","Student is completely indifferent to results","Student fears results","Student lacks ability"],ans:_A1,exp:"V=0 means the student doesn't care about the reward at all — motivation drops to zero."},
{q:"The main distinction between Expectancy (E) and Self-Efficacy (SE) is?",opts:["E is capability judgment, SE is causal judgment","E is causal judgment, SE is capability judgment","They are exactly the same","E only affects Valence"],ans:_A1,exp:"SE asks 'can I do this' (capability), E asks 'will effort lead to results' (causality)."},
{q:"Valence ranges from?",opts:["0 to 1","0 to 100","-1 to +1","-10 to +10"],ans:_A2,exp:"Vroom (1964) specifies Valence ranges -1 to +1; negative values represent outcomes to avoid."},
{q:"The free-rider problem primarily breaks which VIE factor?",opts:["Expectancy","Instrumentality","Valence","None of these"],ans:_A1,exp:"Free-riders make high performers feel 'good performance won't be fairly rewarded,' breaking I."},
{q:"VIE's role in the flywheel is?",opts:["Providing soil","Accumulating experience","Transmission mechanism","Converting experience and confidence into action decisions"],ans:_A3,exp:"VIE is the flywheel's action stage — SE provides confidence, VIE converts it into concrete action."}
],

m4_nav:"4. Transmission Mechanisms",m4_title:"Transmission: Attribution & Mindset",
m4_overview:"Attribution and Mindset are not independent fourth and fifth theories — they serve as transmission mechanisms between the three core theories. Attribution bridges SE→Mindset; Mindset is the bedrock beneath both SE and Expectancy.",
m4_highlights:["Attribution","Three Dimensions","Locus / Stability / Controllability","Growth vs. Fixed Mindset","Mindset→SE","Mindset→E","Mindset→Emotional"],
m4_p1:"Attribution (Weiner, 1985) bridges SE and Mindset. Experience alone doesn't automatically change beliefs — it's the interpretation of experience that changes beliefs. Weiner categorizes causal attributions along three dimensions: Locus (internal/external), Stability (stable/unstable), and Controllability (controllable/uncontrollable).",
m4_p2:"Key insight: When students attribute failure to internal, unstable, controllable factors ('I didn't prepare enough this time'), motivation is maintained. When attributed to internal, stable, uncontrollable factors ('I just can't do it'), they give up and SE erodes. Attribution determines which direction experiences translate — it's the transmission function.",
m4_p3:"Causal chain: Mastery + Vicarious Experience → Attribution → Mindset. Students who have personally succeeded and seen similar peers succeed (SE sources) are forced to reinterpret 'why did I succeed' (Attribution). If attributed to effort and strategy (controllable factors), Mindset shifts toward Growth.",
m4_p4:"Mindset (Dweck, 2006) is the bedrock beneath both SE and Expectancy. Three influence pathways: Mindset→SE (efficacy resilience), Mindset→E (belief in effort→capability improvement), Mindset→Emotional States (positive/negative encoding of physiological arousal).",
m4_p5:"Distinguishing Mindset from Valence: Valence asks 'how important is this outcome' (subjective evaluation); Mindset asks 'can ability change' (deep belief). High V + Growth → active engagement; High V + Fixed → avoidance. Same high Valence, different Mindset, completely opposite behaviors.",
m4_wrapup:"Attribution and Mindset are the transmission gears between the three core theories. Attribution converts success/failure experiences into belief change; Mindset as bedrock simultaneously affects SE resilience, E's causal judgment, and emotional encoding. Instructors don't need to directly intervene at these levels — through operating SE's four sources and guiding attribution direction, the transmission mechanisms operate on their own.",
m4_terms:[
{front:"Attribution",back:"Interpretation of success/failure causes. Weiner (1985): three dimensions — Locus, Stability, Controllability."},
{front:"Locus of Causality",back:"Whether causes are internal (ability, effort) or external (luck, task difficulty)."},
{front:"Stability",back:"Whether causes are enduring (ability) or changeable (effort). Affects expectations of future success."},
{front:"Controllability",back:"Whether causes are personally controllable (effort) or uncontrollable (talent). Affects emotions and motivation maintenance."},
{front:"Growth Mindset",back:"Belief that ability can be developed through effort. High SE resilience, higher E, arousal = excitement."},
{front:"Fixed Mindset",back:"Belief that ability is innate and fixed. Fragile SE, lower E, arousal = fear."}
],
m4_q:[
{q:"Weiner's three attribution dimensions do NOT include?",opts:["Locus","Stability","Controllability","Valence"],ans:_A3,exp:"Weiner's three dimensions are Locus, Stability, and Controllability. Valence belongs to VIE theory."},
{q:"A student saying 'I just can't do it' — this attribution is?",opts:["Internal, unstable, controllable","External, stable, uncontrollable","Internal, stable, uncontrollable","External, unstable, controllable"],ans:_A2,exp:"'I just can't' attributes to ability — internal (self), stable (won't change), uncontrollable (innate)."},
{q:"Attribution's role in the flywheel is?",opts:["An independent fourth theory","One of SE's four sources","The SE→Mindset transmission connector","A VIE sub-factor"],ans:_A2,exp:"Attribution is a transmission mechanism — converting experience interpretation into Mindset change."},
{q:"A Growth Mindset student facing increased heart rate most likely interprets it as?",opts:["I'm scared","I lack ability","I'm excited","I should give up"],ans:_A2,exp:"Growth Mindset encodes physiological arousal positively — racing heart = I'm excited."},
{q:"'High Valence + Fixed Mindset' most likely leads to?",opts:["Active engagement","Challenge avoidance","Indifference","Seeking help"],ans:_A1,exp:"Caring greatly about results but believing ability is fixed → fear of failure proving inadequacy → avoidance."},
{q:"The most effective strategy for loosening students' Fixed Mindset?",opts:["Directly telling students to have Growth Mindset","Indirectly loosening through operating SE's four sources","Lowering course difficulty","Increasing exam frequency"],ans:_A1,exp:"Instructors don't directly intervene in Mindset — operating SE's four sources gradually loosens it."}
],

m5_nav:"5. Flywheel Model",m5_title:"Self-Reinforcing Flywheel Model",
m5_overview:"The three theories aren't just 'complementary' — they're causally chained. SDT provides soil, SE grows experiences on that soil, VIE converts experiences into action decisions. Action outcomes feed back into new experiences, forming a six-stage self-reinforcing flywheel.",
m5_highlights:["Six-Stage Causal Chain","① Soil: SDT","② Experience: SE","③ Interpretation: Attribution","④ Bedrock: Mindset","⑤ Action: VIE","⑥ Feedback Loop","First Push"],
m5_p1:"Stage ① Soil (SDT): Autonomy gives students choice; Relatedness builds trust and identification. This is where everything starts — without soil, meaningful experiences cannot grow.",
m5_p2:"Stage ② Experience (SE): Autonomy→Mastery Experience; Relatedness→Vicarious Experience + Verbal Persuasion. On the soil, concrete success experiences and vicarious learning grow.",
m5_p3:"Stage ③ Interpretation (Attribution): Students attribute success/failure — effort (internal, controllable) vs. ability (internal, uncontrollable). Attribution direction determines whether experience translates toward Growth or Fixed. Stage ④ Bedrock (Mindset): Attribution shapes mindset. Growth strengthens SE+E; Fixed weakens SE+E. Mindset simultaneously affects Emotional States encoding.",
m5_p4:"Stage ⑤ Action (VIE): SE + Mindset strengthen E; combined with I (transparent assessment) and V (real-world connection), driving learning action. Stage ⑥ Feedback (Loop): Action outcomes → new success/failure experiences → back to ②. The flywheel turns again.",
m5_p5:"The first push comes from the instructor's SDT-level classroom design: (1) Providing autonomy — letting students choose topics, formats, difficulty; (2) Building relatedness — fostering peer identification and trust; (3) Consciously guiding attribution — emphasizing effort and strategy, not talent, in feedback. Design at the top (SDT), permeate to the bottom (Mindset).",
m5_wrapup:"The flywheel model integrates three theories and two transmission mechanisms into a complete causal chain. The instructor's lever is concentrated at the SDT level — providing autonomy and relatedness, guiding correct attribution. Once spinning, each revolution's outcome feedback strengthens the next, forming a virtuous cycle. Core principle: design at the top, permeate to the bottom.",
m5_terms:[
{front:"Flywheel Model",back:"SDT→SE→Attribution→Mindset→VIE→Action→Feedback: six-stage self-reinforcing cycle."},
{front:"First Push",back:"Instructor's SDT-level design: providing autonomy, building relatedness, guiding attribution direction."},
{front:"Causal Chain",back:"The three theories aren't just complementary — they have upstream/downstream causal relationships."},
{front:"Design Top,\nPermeate Bottom",back:"Design classroom at SDT level (most upstream); effects automatically permeate to Mindset (deepest layer)."},
{front:"Virtuous Cycle",back:"Each flywheel revolution strengthens success experiences and Growth Mindset, making the next revolution easier."},
{front:"Vicious Cycle",back:"Failure → Fixed attribution → Mindset solidification → SE and E decline → less action → more failure."}
],
m5_q:[
{q:"The flywheel's first stage (soil) corresponds to which theory?",opts:["SE","VIE","SDT","Attribution"],ans:_A2,exp:"SDT provides the soil — Autonomy and Relatedness are where everything starts."},
{q:"The flywheel's 'first push' comes from?",opts:["Students' intrinsic motivation","Instructor's SDT-level classroom design","External reward systems","Peer competition"],ans:_A1,exp:"The first push is instructor's SDT-level design — providing autonomy, building relatedness, guiding attribution."},
{q:"The correct sequence of the flywheel's six stages?",opts:["SDT→VIE→SE→Attribution→Mindset→Feedback","SDT→SE→Attribution→Mindset→VIE→Feedback","VIE→SE→SDT→Mindset→Attribution→Feedback","SE→SDT→VIE→Attribution→Mindset→Feedback"],ans:_A1,exp:"Soil(SDT)→Experience(SE)→Interpretation(Attribution)→Bedrock(Mindset)→Action(VIE)→Feedback."},
{q:"In 'design top, permeate bottom,' 'top' refers to?",opts:["The deepest Mindset","The most upstream SDT","The final action VIE","The middle Attribution"],ans:_A1,exp:"SDT is most upstream — designing at this level, effects automatically permeate down to Mindset."},
{q:"How does the feedback stage (⑥) connect to the next revolution?",opts:["Action outcomes generate new experiences, returning to ② Experience stage","Directly returns to ① Soil for redesign","Skips all middle steps, directly affecting VIE","Only affects Mindset, nothing else"],ans:_A0,exp:"Action outcomes → new success/failure experiences → back to ② (SE sources). The flywheel turns again."},
{q:"The starting point of a vicious cycle is typically?",opts:["Too many success experiences","Attributing failure to stable, uncontrollable factors","Too much instructor autonomy","Valence too high"],ans:_A1,exp:"Failure → attribution to ability (stable, uncontrollable) → Fixed Mindset solidifies → SE and E decline → more action → more failure."}
],

m6_nav:"6. Instructional Design",m6_title:"Instructional Design Implications",
m6_overview:"Based on the three-theory complementary framework and flywheel model, instructors have six actionable levers: Autonomy, Relatedness, scaffolded tasks, attribution guidance, transparent assessment, and real-world connections. Each corresponds to specific flywheel stages.",
m6_highlights:["Autonomy","Relatedness","Scaffolded Tasks","Attribution Guidance","Transparent Assessment","Real-world Connections"],
m6_p1:"Autonomy: Let students choose topics, presentation formats, and difficulty levels. Flywheel path: SDT→Mastery Experience. Students with choice are more likely to select achievable tasks, building meaningful success experiences.",
m6_p2:"Relatedness: Group collaboration, peer feedback, safe classroom atmosphere. Flywheel path: SDT→Vicarious Experience + Verbal Persuasion. Belonging makes peer success and encouragement effective efficacy sources.",
m6_p3:"Scaffolded Tasks: Easy-to-hard task sequences ensuring early success. Corresponds to SE: Mastery Experience (Bandura, 1997). The key design principle: students should succeed at the first task, establishing initial 'I can do this' confidence.",
m6_p4:"Attribution Guidance: Feedback emphasizing 'your strategy was good' rather than 'you're smart.' Flywheel path: Attribution→Growth Mindset (Dweck, 2006). Praising effort and strategy (controllable factors) guides students toward Growth Mindset.",
m6_p5:"Transparent Assessment: Clear effort→grade pathways with anti-free-rider mechanisms (e.g., peer evaluation). Corresponds to VIE: Expectancy + Instrumentality. Real-world Connections: Linking course content to students' future goals. Corresponds to VIE: Valence — transforming 'this course matters' into students' own judgment.",
m6_wrapup:"The six levers aren't independent — they correspond to different flywheel stages, chaining together. Autonomy and Relatedness start the flywheel, scaffolded tasks build experience, attribution guidance shapes mindset, transparent assessment and real-world connections drive action. Instructors need only design well at the SDT level, pair with correct attribution guidance and transparent assessment — the flywheel will turn on its own.",
m6_terms:[
{front:"Attribution Guidance",back:"Emphasizing effort and strategy (controllable factors) in feedback, guiding students to attribute success to their own investment."},
{front:"Scaffolded Tasks",back:"Easy-to-hard task sequences ensuring early success. Key: students must succeed at the first task."},
{front:"Transparent Assessment",back:"Clear effort→grade pathways. Includes anti-free-rider mechanisms to strengthen fairness."},
{front:"Real-world Connection",back:"Linking course content to students' future goals, enhancing Valence."},
{front:"Peer Evaluation",back:"An anti-free-rider mechanism that strengthens Instrumentality's fairness."},
{front:"Praise Strategy,\nNot Talent",back:"'Your method was great' not 'you're smart.' The former guides Growth Mindset; the latter reinforces Fixed Mindset."}
],
m6_q:[
{q:"'Letting students choose topics and formats' corresponds to which flywheel path?",opts:["VIE→Action","SDT (Autonomy)→Mastery Experience","Attribution→Mindset","Mindset→Emotional"],ans:_A1,exp:"Autonomy → choice → achievable tasks → Mastery Experience."},
{q:"Teacher feedback of 'you're so smart' most likely strengthens?",opts:["Growth Mindset","Fixed Mindset","Instrumentality","Relatedness"],ans:_A1,exp:"Praising talent implies ability is innate, reinforcing Fixed Mindset. Praise strategy and effort instead."},
{q:"Peer evaluation primarily strengthens which VIE factor?",opts:["Expectancy","Instrumentality","Valence","None of these"],ans:_A1,exp:"Peer evaluation makes the performance→reward connection fairer, strengthening Instrumentality."},
{q:"The key design principle for scaffolded tasks?",opts:["First task should be hardest","All tasks equal difficulty","Students should succeed at the first task","Only the final task matters"],ans:_A2,exp:"Key: students succeed at the first task, establishing initial 'I can do this' SE."},
{q:"'Connecting course content to future goals' enhances?",opts:["Expectancy","Instrumentality","Valence","Autonomy"],ans:_A2,exp:"Linking course to students' future goals enhances their subjective value of outcomes (Valence)."},
{q:"Which two levers initiate the flywheel?",opts:["Transparent Assessment + Real-world Connections","Scaffolded Tasks + Attribution Guidance","Autonomy + Relatedness","Valence + Instrumentality"],ans:_A2,exp:"Autonomy and Relatedness are SDT-level design — the flywheel's first push."}
],

const FlipCardDeck=({terms,t,moduleId,onCardRead})=>{

const[shuffledOrder]=useState(()=>[...Array(terms.length).keys()].sort(()=>Math.random()-.5));
const groupSize=2;const totalGroups=Math.ceil(terms.length/groupSize);
const startIdx=groupIdx*groupSize;const currentCardIndices=shuffledOrder.slice(startIdx,startIdx+groupSize);
useEffect(()=>{const ns=new Set(shownSet);currentCardIndices.forEach(i=>ns.add(i));if(ns.size!==shownSet.size)setShownSet(ns)},[groupIdx]);
const handleFlip=(origIdx)=>{setFlipped(f=>({...f,[origIdx]:!f[origIdx]}));if(!readSet.has(origIdx)){const nr=new Set(readSet);nr.add(origIdx);setReadSet(nr);if(onCardRead)onCardRead(moduleId,nr.size,shownSet.size,terms.length)}};

<div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">

</div></div>)})}</div>
<div className="flex items-center gap-3 mt-4">
<button onClick={()=>{setGroupIdx(0);setFlipped({})}} className="px-4 py-2 text-sm border border-slate-300 dark:border-slate-500 dark:text-slate-200 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">{t.flip_retry}</button>
<button onClick={()=>groupIdx<totalGroups-1&&setGroupIdx(groupIdx+1)} disabled={groupIdx>=totalGroups-1} className="px-4 py-2 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">{t.flip_next}</button>
</div></div>)};

const ModuleQuiz=({questions,t,moduleId,onQuizSubmit,moduleName})=>{
const[selected,setSelected]=useState({});const[submitted,setSubmitted]=useState({});const[groupIdx,setGroupIdx]=useState(0);
const groupSize=2;const[quizIndices]=useState(()=>[...Array(questions.length).keys()].sort(()=>Math.random()-.5));
const totalGroups=Math.ceil(quizIndices.length/groupSize);
const[shuffledMaps]=useState(()=>quizIndices.map(qIdx=>{const n=questions[qIdx].opts.length;return[...Array(n).keys()].sort(()=>Math.random()-.5)}));
const totalAnswered=Object.keys(selected).length;
const computeCorrect=()=>{let c=0;quizIndices.forEach((qIdx,qi)=>{if(selected[qi]===undefined)return;if(shuffledMaps[qi][selected[qi]]===_d(questions[qIdx].ans))c++});return c};
const statusText=t.quiz_status.replace('{correct}',computeCorrect()).replace('{answered}',totalAnswered).replace('{total}',quizIndices.length);
const currentStart=groupIdx*groupSize;const currentIndices=quizIndices.slice(currentStart,currentStart+groupSize);
const handleGroupSubmit=()=>{const allDone=currentIndices.every((_,i)=>selected[currentStart+i]!==undefined);if(!allDone)return;
setSubmitted(s=>({...s,[groupIdx]:true}));
if(groupIdx===totalGroups-1||Object.keys(submitted).length+1===totalGroups){const wrongQs=[];let correct=0;
quizIndices.forEach((qIdx,qi)=>{if(selected[qi]===undefined)return;if(shuffledMaps[qi][selected[qi]]===_d(questions[qIdx].ans))correct++;else wrongQs.push(questions[qIdx].q)});
onQuizSubmit(moduleId,correct,quizIndices.length,wrongQs,moduleName)}};
return(<div className="mt-8 bg-slate-50 dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">

<p className="text-sm text-slate-500 dark:text-slate-300 mb-6">{statusText}</p>
{currentIndices.map((qIdx,localI)=>{const qi=currentStart+localI;const q=questions[qIdx];const sMap=shuffledMaps[qi];const isGrpSub=!!submitted[groupIdx];
return(<div key={qIdx} className="mb-6"><p className="font-bold mb-3 text-slate-800 dark:text-slate-200">{qi+1}. {q.q}</p>
<div className="space-y-2">{sMap.map((origIdx,dIdx)=>{const isCorrect=origIdx===_d(q.ans);const isSel=selected[qi]===dIdx;
return(<button key={dIdx} onClick={()=>!isGrpSub&&setSelected(s=>({...s,[qi]:dIdx}))}
className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm text-slate-700 dark:text-slate-200 ${isGrpSub?isCorrect?'bg-green-100 border-green-500 dark:bg-green-900/40 dark:border-green-400':isSel?'bg-red-100 border-red-400 dark:bg-red-900/40 dark:border-red-400':'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-700':isSel?'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/10':'border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 hover:border-slate-400 dark:hover:border-slate-400'}`}>
{q.opts[origIdx]}</button>)})}</div>
{isGrpSub&&<p className={`mt-2 text-sm italic ${shuffledMaps[qi][selected[qi]]===_d(q.ans)?'text-green-600 dark:text-green-400':'text-red-500 dark:text-red-400'}`}>
{shuffledMaps[qi][selected[qi]]===_d(q.ans)?`✓ ${t.correct}`:`✗ ${t.incorrect}`} — {t.explanation}：{q.exp}</p>}
</div>)})}
<div className="flex items-center gap-3">{!submitted[groupIdx]?
<button onClick={handleGroupSubmit} disabled={!currentIndices.every((_,i)=>selected[currentStart+i]!==undefined)}
className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">{t.submit}</button>
:<>{groupIdx<totalGroups-1&&<button onClick={()=>setGroupIdx(groupIdx+1)}
className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg">{t.quiz_next}</button>}
<button onClick={()=>{setGroupIdx(0);setSelected({});setSubmitted({})}}
className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg">{t.quiz_retry}</button></>}
</div></div>)};

else if(module===IDX_RES)texts=[t.mres_title,t.mres_desc];
texts=texts.filter(Boolean);

const voices=speechSynthesis.getVoices();
if(lang==='zh'){const v=voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));if(v)utt.voice=v;utt.lang='zh-TW'}

const sanitizeId=v=>v.replace(/[^0-9]/g,'').slice(0,12);

const exportCSV=()=>{
const s=studentInfo;if(!s.group||!s.dept||!s.id||!s.nameEn)return;
const zhT=dict.zh;let rows=[['Group','Dept','StudentID','NameEN','NameZH','Module','TimeS','Clicks','CardsRead','CardsTotal','QuizCorrect','QuizAnswered','QuizTotal','WrongQuestions']];

const bom='\uFEFF';const csv=bom+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');

a.href=url;a.download=`${zhT.brand} ${zhT.title}_${s.nameEn} ${s.nameZh}_${ds}.csv`;a.click();URL.revokeObjectURL(url)};

/* ═══════════ RENDER ═══════════ */
const renderModule=()=>{

  <figcaption className="p-3 sm:p-4 text-center text-sm font-bold text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-800/80 border-t border-slate-200 dark:border-slate-700">
    {t.m0_img_caption}
  </figcaption>

<div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300">

<div><h3 className="text-sm font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 mb-3">{t.highlights_label}</h3>
<div className="flex flex-wrap gap-2">{(t[`${mk}_highlights`]||[]).map((h,i)=>(
<span key={i} className="px-3 py-1 bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] rounded-full text-sm font-medium">{h}</span>))}</div></div>
<div><h3 className="text-sm font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 mb-3">{t.deep_dive_label}</h3>

{t[`${mk}_p2`]&&<p className="p-4 bg-slate-100 dark:bg-slate-800 dark:text-slate-200 rounded-lg italic font-serif my-4">{t[`${mk}_p2`]}</p>}
{t[`${mk}_p3`]&&<p>{t[`${mk}_p3`]}</p>}
{t[`${mk}_p4`]&&<p className="mt-4">{t[`${mk}_p4`]}</p>}
{t[`${mk}_p5`]&&<p className="mt-4">{t[`${mk}_p5`]}</p>}
</div>
{terms.length>0&&<FlipCardDeck key={`cards-${module}`} terms={terms} t={t} moduleId={module} onCardRead={handleCardRead}/>}
<div className="bg-slate-100 dark:bg-slate-800 rounded-xl p-5">
<h3 className="text-sm font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 mb-2">{t.wrapup_label}</h3>
<p className="italic dark:text-slate-200">{t[`${mk}_wrapup`]}</p></div>
{qs.length>0&&<ModuleQuiz key={`quiz-${module}`} questions={qs} t={t} moduleId={module} onQuizSubmit={handleQuizSubmit} moduleName={t[`${mk}_title`]}/>}
</div>)}

/* Lab */
if(module===IDX_LAB)return(
<div className="space-y-6 animate-fade-in" onClick={trackClick}>
<H2 icon="🧪" number={IDX_LAB}>{t.mlab_title}</H2><p className="text-lg text-slate-600 dark:text-slate-300">{t.mlab_desc}</p>

if(module===IDX_RES)return(

const tc=analytics.quizCorrect.reduce((a,b)=>a+b,0);const ta=analytics.quizTotal.reduce((a,b)=>a+b,0);

const totalCards=analytics.cardsRead.reduce((a,b)=>a+b,0);const totalCardsAll=analytics.cardsTotal.reduce((a,b)=>a+b,0);
const cardUsage=totalCardsAll>0?Math.round(totalCards/totalCardsAll*100):0;
const wk=[];for(let i=1;i<=NUM_LEARN;i++){if(analytics.quizTotal[i]>0){const a=Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100);if(a<75)wk.push({name:modulesList[i].title,acc:a,id:i})}}wk.sort((a,b)=>a.acc-b.acc);

<div className="bg-white dark:bg-slate-800 rounded-xl p-4 text-center border border-slate-200 dark:border-slate-700"><p className="text-2xl font-black text-[#004030] dark:text-[#D8C3A5]">{oa}%</p><p className="text-xs text-slate-600 dark:text-slate-300 mt-1">{t.analytics_overall_acc}</p></div>
<div className="bg-white dark:bg-slate-800 rounded-xl p-4 text-center border border-slate-200 dark:border-slate-700"><p className="text-2xl font-black text-[#004030] dark:text-[#D8C3A5]">{cardUsage}%</p><p className="text-xs text-slate-600 dark:text-slate-300 mt-1">{t.analytics_card_usage}</p></div>
</div>
<div className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700">
<h3 className="font-bold mb-3">{t.analytics_progress_title}</h3>
{modulesList.slice(1,NUM_LEARN+1).map(m=>{const visited=analytics.time[m.id]>0;const quizDone=analytics.quizTotal[m.id]>0;
return(<div key={m.id} className="flex items-center gap-3 py-2 border-b border-slate-100 dark:border-slate-700 last:border-0">
<span className="text-sm w-40 truncate">{m.title}</span>
<span className={`text-xs px-2 py-0.5 rounded-full ${visited?'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300':'bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-300'}`}>{visited?t.analytics_progress_visited:t.analytics_progress_not_visited}</span>
{quizDone&&<span className="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300">{t.analytics_progress_quiz_done}</span>}
<button onClick={()=>{setModule(m.id);scrollTo({top:0,behavior:'smooth'})}} className="ml-auto text-xs text-[#004030] dark:text-[#D8C3A5] hover:underline">{t.analytics_wp_goto}</button>
</div>)})}</div>
<div className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700">

{(analytics.wrongTopics[w.id]||[]).length>0&&<p className="text-xs text-red-600 dark:text-red-400 mt-1">{t.analytics_wp_incorrect}{(analytics.wrongTopics[w.id]||[]).join('; ')}</p>}
<button onClick={()=>{setModule(w.id);scrollTo({top:0,behavior:'smooth'})}} className="text-xs text-[#004030] dark:text-[#D8C3A5] hover:underline mt-1">{t.analytics_wp_goto}</button>
</div>)):ta>0?<p className="text-green-600 dark:text-green-400 font-bold">{t.analytics_wp_allpass}</p>:<p className="text-slate-500 dark:text-slate-400">{t.analytics_no_data}</p>}</div>
<div className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700">

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
